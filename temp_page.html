<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZJClaw - 商业管理智能助手</title>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --accent-light: #0f3460;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --border: #2a2a4e;
            --success: #00d26a;
            --warning: #ffc107;
            --error: #dc3545;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(22, 33, 62, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
        }

        .logo-text span {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .header-btn {
            padding: 0.5rem 1rem;
            background: var(--accent-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .header-btn:hover {
            background: var(--secondary);
            border-color: var(--accent);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--accent-light);
            border-radius: 20px;
            font-size: 0.875rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .status-dot.offline {
            background: var(--error);
        }

        .status-dot.config-error {
            background: var(--warning);
        }

        .main-container {
            flex: 1;
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 1rem;
            gap: 1rem;
        }

        .sidebar {
            width: 280px;
            background: rgba(22, 33, 62, 0.8);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-title {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .skill-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .skill-item {
            padding: 0.75rem 1rem;
            background: var(--accent-light);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .skill-item:hover {
            background: var(--secondary);
            border-color: var(--accent);
        }

        .skill-item.active {
            background: var(--accent);
            color: white;
        }

        .skill-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .skill-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .skill-item.active .skill-desc {
            color: rgba(255,255,255,0.8);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(22, 33, 62, 0.8);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            background: rgba(26, 26, 46, 0.5);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .model-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            background: var(--accent-light);
            border-radius: 12px;
            color: var(--text-muted);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .message.bot .message-avatar {
            background: var(--accent);
        }

        .message.user .message-avatar {
            background: var(--accent-light);
        }

        .message-content {
            max-width: 70%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            line-height: 1.6;
        }

        .message.bot .message-content {
            background: var(--accent-light);
            border-bottom-left-radius: 4px;
        }

        .message.user .message-content {
            background: var(--accent);
            border-bottom-right-radius: 4px;
        }

        .message-content pre {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        .message-content code {
            font-family: 'Consolas', 'Monaco', monospace;
            background: rgba(0,0,0,0.2);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .message-content pre code {
            background: none;
            padding: 0;
        }

        .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.5rem 0;
        }

        .message-content th, .message-content td {
            border: 1px solid var(--border);
            padding: 0.5rem;
            text-align: left;
        }

        .message-content th {
            background: rgba(0,0,0,0.2);
        }

        .chat-input-area {
            padding: 1rem 1.5rem;
            background: rgba(26, 26, 46, 0.5);
            border-top: 1px solid var(--border);
        }

        .chat-input-form {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: var(--primary);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            padding: 0.875rem 1.5rem;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .send-btn:hover:not(:disabled) {
            background: #d63850;
            transform: translateY(-2px);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .quick-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .quick-btn {
            padding: 0.5rem 1rem;
            background: var(--accent-light);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quick-btn:hover {
            background: var(--secondary);
            border-color: var(--accent);
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        /* Settings Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--secondary);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--primary);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #d63850;
        }

        .btn-secondary {
            background: var(--accent-light);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--secondary);
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .alert-success {
            background: rgba(0, 210, 106, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid var(--error);
            color: var(--error);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-light);
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .main-container {
                padding: 0.5rem;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🦞</div>
            <div class="logo-text">ZJ<span>Claw</span></div>
        </div>
        <div class="header-actions">
            <span class="model-badge" id="modelBadge">未配置</span>
            <button class="header-btn" onclick="openSettings()">
                <span>⚙️</span>
                <span>设置</span>
            </button>
            <div class="status-badge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </div>
        </div>
    </header>

    <main class="main-container">
        <aside class="sidebar">
            <div class="sidebar-title">商业管理技能</div>
            <div class="skill-list">
                <div class="skill-item" data-skill="recruitment">
                    <div class="skill-name">商业招商</div>
                    <div class="skill-desc">品牌定位、租户评估、招商谈判</div>
                </div>
                <div class="skill-item" data-skill="operations">
                    <div class="skill-name">商业运营</div>
                    <div class="skill-desc">运营标准、巡场管理、经营分析</div>
                </div>
                <div class="skill-item" data-skill="marketing">
                    <div class="skill-name">数字营销</div>
                    <div class="skill-desc">私域运营、社媒营销、会员管理</div>
                </div>
                <div class="skill-item" data-skill="engineering">
                    <div class="skill-name">工程物管</div>
                    <div class="skill-desc">设备管理、安全管理、能耗管控</div>
                </div>
                <div class="skill-item" data-skill="finance">
                    <div class="skill-name">财务管理</div>
                    <div class="skill-desc">预算管理，成本分析、收益管理</div>
                </div>
                <div class="skill-item" data-skill="hr">
                    <div class="skill-name">人事行政</div>
                    <div class="skill-desc">招聘培训、绩效考核、薪酬管理</div>
                </div>
            </div>
        </aside>

        <section class="chat-area">
            <div class="chat-header">
                <div class="chat-title">
                    <span>🦞</span>
                    <span>ZJClaw 智能助手</span>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">🦞</div>
                    <h3>欢迎使用 ZJClaw</h3>
                    <p>专业的商业管理智能助手，请输入您的问题</p>
                    <p style="margin-top: 1rem; color: var(--warning);">首次使用请先在右上角设置中配置 API Key</p>
                </div>
            </div>
            <div class="chat-input-area">
                <form class="chat-input-form" id="chatForm">
                    <div class="input-wrapper">
                        <textarea 
                            class="chat-input" 
                            id="messageInput" 
                            placeholder="输入您的商业管理问题..."
                            rows="1"
                        ></textarea>
                    </div>
                    <button type="submit" class="send-btn" id="sendBtn">
                        <span>发送</span>
                        <span>→</span>
                    </button>
                </form>
                <div class="quick-actions">
                    <button class="quick-btn" data-msg="帮我制定一份年度招商计划">招商计划</button>
                    <button class="quick-btn" data-msg="分析本月运营数据报告">运营分析</button>
                    <button class="quick-btn" data-msg="策划一场会员营销活动">营销活动</button>
                    <button class="quick-btn" data-msg="审核装修施工方案">工程审核</button>
                    <button class="quick-btn" data-msg="编制年度财务预算">财务预算</button>
                    <button class="quick-btn" data-msg="设计绩效考核方案">绩效考核</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>⚙️ 设置</h2>
                <button class="modal-close" onclick="closeSettings()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="settingsAlert"></div>
                
                <div class="form-group">
                    <label for="providerSelect">AI 提供商</label>
                    <select id="providerSelect" onchange="onProviderChange()">
                        <option value="">请选择...</option>
                        <option value="minimax">MiniMax</option>
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="zhipu">智谱 AI</option>
                        <option value="dashscope">阿里云百炼</option>
                        <option value="openrouter">OpenRouter</option>
                        <option value="ollama">Ollama (本地)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="modelSelect">模型</label>
                    <select id="modelSelect">
                        <option value="">请先选择提供商</option>
                    </select>
                    <div class="form-hint" id="modelHint"></div>
                </div>

                <div class="form-group">
                    <label for="apiKeyInput">API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="输入您的 API Key">
                    <div class="form-hint">API Key 将在本地保存，不会上传到任何服务器</div>
                </div>

                <div class="form-group" id="apiBaseGroup" style="display: none;">
                    <label for="apiBaseInput">API Base URL (可选)</label>
                    <input type="text" id="apiBaseInput" placeholder="如: https://api.minimaxi.com/v1">
                    <div class="form-hint">大多数情况不需要填写，使用默认值即可</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
                <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
            </div>
        </div>
    </div>

    <script>
        // Model configurations
        const modelConfigs = {
            minimax: {
                models: [
                    { id: 'MiniMax-M2.7', name: 'MiniMax-M2.7 (推荐)' },
                    { id: 'MiniMax-M2.5', name: 'MiniMax-M2.5' },
                    { id: 'abab6.5s-chat', name: 'abab6.5s-chat' },
                    { id: 'abab6.5g-chat', name: 'abab6.5g-chat' },
                    { id: 'MiniMax-Text-01', name: 'MiniMax-Text-01' },
                ],
                defaultBase: 'https://api.minimaxi.com/v1',
                hint: 'API Key 获取: https://platform.minimaxi.com'
            },
            openai: {
                models: [
                    { id: 'gpt-4o', name: 'GPT-4o' },
                    { id: 'gpt-4o-mini', name: 'GPT-4o Mini' },
                    { id: 'gpt-4-turbo', name: 'GPT-4 Turbo' },
                    { id: 'gpt-3.5-turbo', name: 'GPT-3.5 Turbo' },
                ],
                defaultBase: 'https://api.openai.com/v1',
                hint: '从 https://platform.openai.com 获取 API Key'
            },
            anthropic: {
                models: [
                    { id: 'claude-opus-4-5', name: 'Claude Opus 4.5' },
                    { id: 'claude-sonnet-4-5', name: 'Claude Sonnet 4.5' },
                    { id: 'claude-haiku-3-5', name: 'Claude Haiku 3.5' },
                ],
                defaultBase: 'https://api.anthropic.com/v1',
                hint: '从 https://console.anthropic.com 获取 API Key'
            },
            deepseek: {
                models: [
                    { id: 'deepseek-chat', name: 'DeepSeek Chat' },
                    { id: 'deepseek-coder', name: 'DeepSeek Coder' },
                ],
                defaultBase: 'https://api.deepseek.com/v1',
                hint: '从 https://platform.deepseek.com 获取 API Key'
            },
            zhipu: {
                models: [
                    { id: 'glm-4', name: 'GLM-4' },
                    { id: 'glm-4-flash', name: 'GLM-4-Flash' },
                    { id: 'glm-3-turbo', name: 'GLM-3-Turbo' },
                ],
                defaultBase: 'https://open.bigmodel.cn/api/paas/v4',
                hint: '从 https://open.bigmodel.cn 获取 API Key'
            },
            dashscope: {
                models: [
                    { id: 'qwen-plus', name: '通义千问 Plus' },
                    { id: 'qwen-turbo', name: '通义千问 Turbo' },
                    { id: 'qwen-max', name: '通义千问 Max' },
                ],
                defaultBase: 'https://dashscope.aliyuncs.com/compatible-mode/v1',
                hint: '从 https://dashscope.console.aliyun.com 获取 API Key'
            },
            openrouter: {
                models: [
                    { id: 'anthropic/claude-opus-4-5', name: 'Claude Opus (OpenRouter)' },
                    { id: 'anthropic/claude-sonnet-4-5', name: 'Claude Sonnet (OpenRouter)' },
                    { id: 'openai/gpt-4o', name: 'GPT-4o (OpenRouter)' },
                    { id: 'google/gemini-2.0-flash', name: 'Gemini 2.0 Flash' },
                    { id: 'deepseek/deepseek-chat-v3-0324', name: 'DeepSeek V3 (OpenRouter)' },
                ],
                defaultBase: 'https://openrouter.ai/api/v1',
                hint: '从 https://openrouter.ai/keys 获取 API Key'
            },
            ollama: {
                models: [
                    { id: 'llama3', name: 'Llama 3' },
                    { id: 'llama3.1', name: 'Llama 3.1' },
                    { id: 'qwen2.5', name: 'Qwen 2.5' },
                    { id: 'deepseek-v2', name: 'DeepSeek V2' },
                ],
                defaultBase: 'http://localhost:11434/v1',
                hint: '确保 Ollama 已运行，默认地址 http://localhost:11434'
            }
        };

        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const emptyState = document.getElementById('emptyState');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const modelBadge = document.getElementById('modelBadge');
        const settingsModal = document.getElementById('settingsModal');
        const settingsAlert = document.getElementById('settingsAlert');

        let isLoading = false;
        let currentConfig = { provider: '', model: '', apiKey: '', apiBase: '' };

        // Load settings on page load
        async function loadSettings() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                if (data.config) {
                    currentConfig = data.config;
                    if (currentConfig.provider) {
                        document.getElementById('providerSelect').value = currentConfig.provider;
                        onProviderChange();
                        document.getElementById('modelSelect').value = currentConfig.model || '';
                        document.getElementById('apiKeyInput').value = currentConfig.apiKey || '';
                        document.getElementById('apiBaseInput').value = currentConfig.apiBase || '';
                    }
                    if (currentConfig.model) {
                        modelBadge.textContent = currentConfig.model.split('/').pop();
                    }
                }
            } catch (e) {
                console.log('Failed to load settings');
            }
        }

        function onProviderChange() {
            const provider = document.getElementById('providerSelect').value;
            const modelSelect = document.getElementById('modelSelect');
            const modelHint = document.getElementById('modelHint');
            const apiBaseGroup = document.getElementById('apiBaseGroup');
            
            modelSelect.innerHTML = '<option value="">请选择...</option>';
            
            if (provider && modelConfigs[provider]) {
                const config = modelConfigs[provider];
                config.models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = m.name;
                    modelSelect.appendChild(opt);
                });
                modelHint.textContent = config.hint;
                
                if (provider === 'ollama' || provider === 'custom') {
                    apiBaseGroup.style.display = 'block';
                } else {
                    apiBaseGroup.style.display = 'none';
                }
            } else {
                modelHint.textContent = '';
                apiBaseGroup.style.display = 'none';
            }
        }

        async function saveSettings() {
            const provider = document.getElementById('providerSelect').value;
            const model = document.getElementById('modelSelect').value;
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const apiBase = document.getElementById('apiBaseInput').value.trim();

            if (!provider) {
                showAlert('请选择 AI 提供商', 'error');
                return;
            }
            if (!model) {
                showAlert('请选择模型', 'error');
                return;
            }
            if (!apiKey) {
                showAlert('请输入 API Key', 'error');
                return;
            }

            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ provider, model, apiKey, apiBase })
                });
                const data = await response.json();
                
                if (data.success) {
                    currentConfig = { provider, model, apiKey, apiBase };
                    modelBadge.textContent = model.split('/').pop();
                    showAlert('设置已保存', 'success');
                    setTimeout(closeSettings, 1000);
                } else {
                    showAlert(data.error || '保存失败', 'error');
                }
            } catch (e) {
                showAlert('保存失败: ' + e.message, 'error');
            }
        }

        function showAlert(message, type) {
            settingsAlert.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        function openSettings() {
            settingsAlert.innerHTML = '';
            settingsModal.classList.add('active');
        }

        function closeSettings() {
            settingsModal.classList.remove('active');
        }

        // Close modal on outside click
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                closeSettings();
            }
        });

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                if (data.status === 'ready') {
                    statusDot.classList.remove('offline', 'config-error');
                    statusText.textContent = '就绪';
                    if (data.model) {
                        modelBadge.textContent = data.model.split('/').pop();
                    }
                } else if (data.status === 'not_configured') {
                    statusDot.classList.add('config-error');
                    statusDot.classList.remove('offline');
                    statusText.textContent = '未配置';
                    modelBadge.textContent = '未配置';
                } else {
                    statusDot.classList.add('offline');
                    statusDot.classList.remove('config-error');
                    statusText.textContent = '离线';
                }
            } catch (e) {
                statusDot.classList.add('offline');
                statusText.textContent = '离线';
            }
        }

        async function sendMessage(message) {
            if (isLoading || !message.trim()) return;
            
            if (!currentConfig.apiKey) {
                addMessage('bot', '<div style="color: var(--warning);">请先在设置中配置 API Key</div>');
                return;
            }
            
            isLoading = true;
            sendBtn.disabled = true;
            emptyState.style.display = 'none';

            addMessage('user', message);

            const loadingMsg = addMessage('bot', '<div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div><span>思考中...</span></div>');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                loadingMsg.remove();

                if (data.error) {
                    addMessage('bot', `<div style="color: var(--error);">错误: ${data.error}</div>`);
                } else {
                    addMessage('bot', formatMarkdown(data.response || data.message || '收到您的消息'));
                }
            } catch (e) {
                loadingMsg.remove();
                addMessage('bot', `<div style="color: var(--error);">网络错误: ${e.message}</div>`);
            }

            isLoading = false;
            sendBtn.disabled = false;
        }

        function addMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `
                <div class="message-avatar">${role === 'bot' ? '🦞' : '👤'}</div>
                <div class="message-content">${content}</div>
            `;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        function formatMarkdown(text) {
            let html = text
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/^\- (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/\n/g, '<br>');
            return html;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (message) {
                messageInput.value = '';
                messageInput.style.height = 'auto';
                await sendMessage(message);
            }
        });

        document.querySelectorAll('.skill-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.skill-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                
                const skillNames = {
                    recruitment: '商业招商',
                    operations: '商业运营',
                    marketing: '数字营销',
                    engineering: '工程物管',
                    finance: '财务管理',
                    hr: '人事行政'
                };
                sendMessage(`我想使用${skillNames[item.dataset.skill]}技能，请提供相关帮助`);
            });
        });

        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                sendMessage(btn.dataset.msg);
            });
        });

        // Initialize
        loadSettings();
        checkStatus();
        setInterval(checkStatus, 10000);
    </script>
</body>
</html>
